<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cantones Food - Delivery Local</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .hero-green { background: linear-gradient(135deg, #166534, #4ade80); }
    .restaurant-card { transition: all 0.3s; }
    .restaurant-card:hover { transform: translateY(-8px); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- HEADER -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-green-700 rounded-2xl flex items-center justify-center text-white text-2xl">🌿</div>
        <div>
          <h1 class="text-2xl font-bold text-green-800">Cantones Food</h1>
          <p class="text-xs text-green-600 -mt-1">Acosta • Aserrí</p>
        </div>
      </div>

      <div class="flex items-center gap-2 text-sm">
        <i class="fa-solid fa-location-dot text-green-600"></i>
        <div>
          <p class="font-medium">Aserrí, San José</p>
          <p class="text-xs text-gray-500">Entrega en 20-35 min</p>
        </div>
      </div>

      <div class="flex-1 max-w-md mx-6">
        <div class="relative">
          <input type="text" id="search" placeholder="¿Qué se te antoja hoy?" 
                 class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-3xl focus:outline-none focus:border-green-600 text-sm"/>
          <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <button onclick="toggleCart()" class="relative flex items-center gap-2 bg-green-50 px-5 py-2 rounded-3xl hover:bg-green-100">
        <i class="fa-solid fa-shopping-cart text-xl text-green-700"></i>
        <span id="cart-count" class="bg-green-600 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
      </button>
    </div>
  </header>

  <!-- HERO / BANNER -->
  <div class="hero-green text-white py-12">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <h2 class="text-4xl font-bold mb-3">¿Hambre?</h2>
      <p class="text-xl mb-8">Pedí de tus locales favoritos de Acosta y Aserrí</p>
      <button onclick="verRestaurantes()" 
              class="bg-white text-green-700 font-semibold text-lg px-10 py-4 rounded-3xl shadow-lg hover:scale-105 transition">
        🌮 VER RESTAURANTES
      </button>
      <p class="text-sm mt-4 opacity-90">Entrar como cliente sin cuenta</p>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4 py-8">
    <h3 class="font-semibold text-xl mb-6">Restaurantes cerca de ti</h3>
    
    <div id="restaurants" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Se llenan con JavaScript -->
    </div>
  </div>

  <!-- CARRITO -->
  <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-96 bg-white shadow-2xl translate-x-full transition-transform duration-300 z-50 overflow-y-auto">
    <div class="p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-green-800">Tu Pedido</h2>
        <button onclick="toggleCart()" class="text-3xl text-gray-400">✕</button>
      </div>
      <div id="cart-items" class="space-y-4"></div>
      
      <div class="border-t pt-6 mt-8">
        <div class="flex justify-between text-xl font-semibold">
          <span>Total</span>
          <span id="total-price">$0</span>
        </div>
        <button onclick="checkout()" class="w-full bg-green-700 text-white py-4 rounded-3xl mt-6 text-lg font-semibold">
          Confirmar Pedido
        </button>
      </div>
    </div>
  </div>

  <script>
    const restaurants = [
      { id:1, name:"Soda La Esquina", category:"Comida Típica", time:"15-25 min", rating:4.9, price:"$", img:"https://picsum.photos/id/201/400/250" },
      { id:2, name:"Pizzería Don Pepe", category:"Pizza", time:"20-30 min", rating:4.7, price:"$$", img:"https://picsum.photos/id/292/400/250" },
      { id:3, name:"Burger Acosta", category:"Hamburguesas", time:"18-28 min", rating:4.8, price:"$", img:"https://picsum.photos/id/20/400/250" },
      { id:4, name:"Sushi Aserrí", category:"Sushi", time:"25-35 min", rating:4.6, price:"$$$", img:"https://picsum.photos/id/133/400/250" }
    ];

    let cart = [];

    function renderRestaurants() {
      const container = document.getElementById('restaurants');
      container.innerHTML = restaurants.map(r => `
        <div class="restaurant-card bg-white rounded-3xl overflow-hidden shadow-md">
          <img src="${r.img}" class="w-full h-48 object-cover"/>
          <div class="p-5">
            <div class="flex justify-between items-start">
              <div>
                <h4 class="font-bold text-lg">${r.name}</h4>
                <p class="text-green-600 text-sm">${r.category}</p>
              </div>
              <div class="text-right">
                <span class="text-yellow-500">★ ${r.rating}</span>
              </div>
            </div>
            <p class="text-sm text-gray-500 mt-1">${r.time} • ${r.price}</p>
            <button onclick="addToCart(${r.id})" 
                    class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl font-medium">
              Ver menú
            </button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const item = {
        id: Date.now(),
        name: "Casado con Pollo",
        price: 4500,
        qty: 1
      };
      cart.push(item);
      updateCart();
      alert("¡Añadido al carrito!");
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.length;
    }

    function toggleCart() {
      document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
    }

    function checkout() {
      if (cart.length === 0) return alert("Tu carrito está vacío");
      alert("¡Pedido confirmado! Gracias por elegir Cantones Food ❤️");
      cart = [];
      updateCart();
      toggleCart();
    }

    function verRestaurantes() {
      document.getElementById('restaurants').scrollIntoView({ behavior: "smooth" });
    }

    // Iniciar
    renderRestaurants();
  </script>
</body>
</html>
