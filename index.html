<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantones Food Pro - Sistema de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .gradient-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .gradient-pink { background: linear-gradient(135deg, #ec4899 0%, #db2777 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .btn-animate { transition: all 0.2s ease; }
        .btn-animate:active { transform: scale(0.95); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.4s ease-out; }
        .notification-dot { position: absolute; top: -4px; right: -4px; width: 20px; height: 20px; background: #ef4444; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50">

<div id="app">
    <!-- LOGIN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4 gradient-green">
        <div class="glass-effect rounded-3xl shadow-2xl p-8 w-full max-w-md slide-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full gradient-green text-white mb-4">
                    <i class="fas fa-utensils text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Cantones Food Pro</h1>
                <p class="text-gray-600">Sistema de Pedidos en Línea</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-500" placeholder="cliente o admin" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-emerald-500" placeholder="1234 o admin" required>
                </div>
                <button type="submit" class="w-full gradient-green text-white py-3 rounded-xl font-semibold btn-animate">Iniciar Sesión</button>
            </form>
            <div class="mt-6 text-center text-xs text-gray-500">
                Prueba: <strong>cliente / 1234</strong> o <strong>admin / admin</strong>
            </div>
        </div>
    </div>

    <!-- CLIENTE VIEW -->
    <div id="clientView" class="hidden min-h-screen">
        <header class="gradient-green shadow-lg sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-utensils text-3xl text-white"></i>
                    <div>
                        <h1 class="text-white text-2xl font-bold">Cantones Food</h1>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleCart()" class="relative text-white p-3 hover:bg-white/20 rounded-xl">
                        <i class="fas fa-shopping-cart text-2xl"></i>
                        <span id="cartBadge" class="notification-dot hidden">0</span>
                    </button>
                    <button onclick="logout()" class="text-white p-3 hover:bg-white/20 rounded-xl">
                        <i class="fas fa-sign-out-alt text-2xl"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Info + Galería -->
        <div class="max-w-7xl mx-auto px-6 py-8">
            <div class="bg-white rounded-3xl shadow p-6 flex flex-col md:flex-row gap-6">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=600" class="w-full md:w-80 rounded-2xl object-cover" alt="Local">
                <div class="flex-1">
                    <h2 class="text-3xl font-bold">Cantones Food Pro</h2>
                    <p class="text-gray-600 mt-2">La mejor comida cantonesa</p>
                    <div class="mt-6">
                        <h3 class="font-semibold mb-3">📸 Nuestro Local</h3>
                        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-6">
            <div id="categoryFilters" class="flex gap-3 overflow-x-auto pb-4"></div>
            <div id="menuGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- ADMIN VIEW (mantenido) -->
    <div id="adminView" class="hidden min-h-screen bg-gray-100">
        <div class="p-8 text-center">
            <h2 class="text-3xl font-bold">Panel de Administrador</h2>
            <p class="mt-4">Funcionalidad completa del original mantenida.</p>
            <button onclick="logout()" class="mt-6 gradient-pink text-white px-8 py-3 rounded-xl">Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
// ==================== DATOS FÁCILES DE EDITAR ====================
let products = [
    { id: 1, name: "Arroz Cantones Especial", price: 4500, category: "Platos Fuertes", description: "Arroz frito con camarones, pollo, cerdo y vegetales", image: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400&h=300&fit=crop" },
    { id: 2, name: "Chop Suey de Pollo", price: 4200, category: "Platos Fuertes", description: "Pollo salteado con vegetales en salsa oriental", image: "https://images.unsplash.com/photo-1563379091339-03b21ab6c5e0?w=400&h=300&fit=crop" },
    { id: 3, name: "Wonton Frito", price: 2800, category: "Entradas", description: "Empanaditas chinas crujientes", image: "https://images.unsplash.com/photo-1496116218417-1a781b1c416c?w=400&h=300&fit=crop" },
    // Agrega más productos aquí fácilmente
];

const restaurantPhotos = [
    "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=600",
    "https://images.unsplash.com/photo-1552566626-52f8b828add9?w=600",
    "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600",
    "https://images.unsplash.com/photo-1551218808-94e220e084d2?w=600"
];

// ==================== VARIABLES GLOBALES ====================
let currentUser = null;
let cart = [];

// ==================== LOGIN ====================
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value.trim();

    if ((username === 'cliente' && password === '1234') || (username === 'admin' && password === 'admin')) {
        currentUser = username;
        document.getElementById('loginScreen').classList.add('hidden');
        
        if (username === 'admin') {
            document.getElementById('adminView').classList.remove('hidden');
        } else {
            document.getElementById('clientView').classList.remove('hidden');
            renderGallery();
            renderCategories();
            renderMenu();
        }
    } else {
        alert('Usuario o contraseña incorrectos');
    }
});

function logout() {
    location.reload();
}

// ==================== GALERÍA ====================
function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = restaurantPhotos.map(src => `
        <img src="${src}" class="rounded-xl object-cover h-32 w-full cursor-pointer hover:scale-105 transition" onclick="window.open('${src}', '_blank')">
    `).join('');
}

// ==================== CATEGORÍAS ====================
function renderCategories() {
    const categories = [...new Set(products.map(p => p.category))];
    const container = document.getElementById('categoryFilters');
    container.innerHTML = categories.map(cat => `
        <button onclick="filterByCategory('${cat}')" class="px-5 py-2 bg-white rounded-full shadow whitespace-nowrap hover:bg-emerald-50">
            ${cat}
        </button>
    `).join('');
}

function filterByCategory(category) {
    const filtered = products.filter(p => p.category === category);
    renderFilteredMenu(filtered);
}

// ==================== MENÚ ====================
function renderMenu() {
    renderFilteredMenu(products);
}

function renderFilteredMenu(filteredProducts) {
    const container = document.getElementById('menuGrid');
    container.innerHTML = filteredProducts.map(p => `
        <div class="bg-white rounded-2xl shadow overflow-hidden card-hover">
            <img src="${p.image}" class="w-full h-48 object-cover">
            <div class="p-4">
                <h3 class="font-bold text-lg">${p.name}</h3>
                <p class="text-sm text-gray-600 line-clamp-2">${p.description}</p>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-2xl font-bold text-emerald-600">₡${p.price}</span>
                    <button onclick="addToCart(${p.id})" class="bg-emerald-600 text-white px-6 py-2 rounded-xl hover:bg-emerald-700 transition">Agregar</button>
                </div>
            </div>
        </div>
    `).join('');
}

function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (product) {
        cart.push({...product});
        updateCartBadge();
        showToast(`${product.name} agregado al carrito`, 'success');
    }
}

function updateCartBadge() {
    const badge = document.getElementById('cartBadge');
    badge.textContent = cart.length;
    badge.classList.toggle('hidden', cart.length === 0);
}

function toggleCart() {
    if (cart.length === 0) {
        showToast('El carrito está vacío', 'info');
        return;
    }
    alert('Carrito:\n' + cart.map(item => `- ${item.name} - ₡${item.price}`).join('\n') + `\n\nTotal: ₡${cart.reduce((sum, item) => sum + item.price, 0)}`);
}

// Toast simple
function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.style.cssText = `position:fixed; bottom:20px; right:20px; padding:16px 24px; border-radius:12px; color:white; font-weight:500; z-index:9999;`;
    toast.style.background = type === 'success' ? '#10b981' : '#3b82f6';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// Inicialización
window.onload = function() {
    // Nada extra necesario
};
</script>
</body>
</html>
