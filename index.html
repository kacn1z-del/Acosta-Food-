<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantones Food - Acosta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .gradient-green { background: linear-gradient(135deg, #10b981, #059669); }
        .gradient-pink { background: linear-gradient(135deg, #ec4899, #db2777); }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); }
        .tab-active { border-bottom: 3px solid #ec4899; color: #ec4899; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50">

<!-- LANDING PAGE -->
<div id="landing" class="min-h-screen flex items-center justify-center gradient-green">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-green-700 text-white p-8 text-center">
            <div class="flex justify-center mb-4">
                <span class="text-6xl">🌿</span>
            </div>
            <h1 class="text-4xl font-bold">Cantones Food</h1>
            <p class="mt-2">El sabor de Acosta y Aserrí en tu celular</p>
        </div>
        <div class="p-8">
            <p class="text-center text-xl font-medium mb-6">¿Hambre? Pedí de tus locales favoritos</p>
            
            <button onclick="showRestaurants()" 
                    class="w-full bg-green-500 hover:bg-green-600 text-white py-5 rounded-2xl text-xl font-semibold flex items-center justify-center gap-3 mb-4">
                🍽️ VER RESTAURANTES
            </button>
            
            <button onclick="showLogin()" 
                    class="w-full border border-gray-300 py-4 rounded-2xl flex items-center justify-center gap-2 text-gray-700">
                🔑 Acceso Administradores y Restaurantes
            </button>
        </div>
    </div>
</div>

<!-- LISTA DE RESTAURANTES -->
<div id="restaurantsList" class="hidden min-h-screen bg-gray-50 p-6">
    <h1 class="text-3xl font-bold mb-6">Restaurantes Disponibles</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="restaurantCards"></div>
</div>

<!-- CLIENT VIEW -->
<div id="clientView" class="hidden min-h-screen">
    <!-- Header + Menú + Checkout se cargan dinámicamente -->
</div>

<!-- LOGIN -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-8 w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6">Iniciar Sesión</h2>
        <input id="loginUser" placeholder="Usuario" class="w-full p-4 rounded-2xl border mb-3">
        <input id="loginPass" type="password" placeholder="Contraseña" class="w-full p-4 rounded-2xl border mb-6">
        <button onclick="handleLogin()" class="w-full gradient-pink text-white py-4 rounded-2xl font-semibold">Entrar</button>
        <button onclick="hideLogin()" class="w-full mt-3 text-gray-500">Cancelar</button>
    </div>
</div>

<!-- PANEL RESTAURANTE / SUPER ADMIN -->
<div id="adminPanel" class="hidden min-h-screen bg-gray-100">
    <div class="gradient-pink text-white p-4 flex justify-between items-center">
        <h1 id="panelTitle" class="text-2xl font-bold">Panel de Restaurante</h1>
        <div class="flex gap-4">
            <button onclick="togglePause()" id="pauseBtn" class="px-5 py-2 bg-white/20 rounded-xl">Pausar Pedidos</button>
            <button onclick="logout()" class="px-5 py-2 bg-white/20 rounded-xl">Cerrar Sesión</button>
        </div>
    </div>
    <div class="flex border-b">
        <button onclick="switchTab(0)" class="tab px-6 py-4 tab-active">Dashboard</button>
        <button onclick="switchTab(1)" class="tab px-6 py-4">Productos</button>
        <button onclick="switchTab(2)" class="tab px-6 py-4">Órdenes</button>
        <button onclick="switchTab(3)" class="tab px-6 py-4">Configuración</button>
    </div>
    <div id="adminContent" class="p-6"></div>
</div>

<script>
// ==================== DATOS ====================
let currentRole = null;
let currentRestaurant = null;
let isPaused = false;
let cart = [];

const restaurants = [
    {
        id: 1,
        name: "Cantones Food Pro",
        type: "Cantonesa",
        color: "green",
        products: [
            {id:1, name:"Arroz Cantones Especial", price:4500, desc:"Arroz frito con mariscos", img:"https://picsum.photos/id/201/400/300"},
            {id:2, name:"Chop Suey Pollo", price:4200, desc:"Pollo con vegetales", img:"https://picsum.photos/id/292/400/300"}
        ]
    },
    {
        id: 2,
        name: "El Guila",
        type: "Comida Típica",
        color: "pink",
        products: [
            {id:3, name:"Casado con Carne", price:6000, desc:"Arroz, frijoles, carne, ensalada", img:"https://picsum.photos/id/431/400/300"}
        ]
    }
];

// ==================== NAVEGACIÓN ====================
function showRestaurants() {
    document.getElementById('landing').classList.add('hidden');
    const container = document.getElementById('restaurantsList');
    container.classList.remove('hidden');
    
    container.querySelector('#restaurantCards').innerHTML = restaurants.map(r => `
        <div onclick="selectRestaurant(${r.id})" class="bg-white rounded-3xl shadow-xl overflow-hidden cursor-pointer hover:scale-105 transition">
            <img src="${r.products[0].img}" class="w-full h-52 object-cover">
            <div class="p-6">
                <h3 class="font-bold text-2xl">${r.name}</h3>
                <p class="text-gray-600">${r.type}</p>
            </div>
        </div>
    `).join('');
}

function selectRestaurant(id) {
    currentRestaurant = restaurants.find(r => r.id === id);
    document.getElementById('restaurantsList').classList.add('hidden');
    loadClientView();
}

function loadClientView() {
    document.getElementById('clientView').classList.remove('hidden');
    // Aquí iría el menú completo del restaurante seleccionado
    alert(`Bienvenido a ${currentRestaurant.name} 🍽️\n\n(El menú completo se cargaría aquí)`);
}

// ==================== LOGIN ====================
function showLogin() {
    document.getElementById('loginModal').classList.remove('hidden');
}

function hideLogin() {
    document.getElementById('loginModal').classList.add('hidden');
}

function handleLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();

    if (user === 'elguila' && pass === 'casado6000') {
        currentRole = 'restaurant';
        loadAdminPanel("El Guila");
    } else if (user === 'vendedor' && pass === 'acosta2026') {
        currentRole = 'superadmin';
        loadAdminPanel("Super Admin");
    } else if (user === 'cliente' && pass === '1234') {
        alert("Acceso como cliente normal");
    } else {
        alert("Credenciales incorrectas");
    }
}

function loadAdminPanel(title) {
    hideLogin();
    document.getElementById('landing').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    document.getElementById('panelTitle').textContent = title;
    switchTab(0);
}

// ==================== TABS ADMIN ====================
function switchTab(tab) {
    const content = document.getElementById('adminContent');
    if (tab === 0) {
        content.innerHTML = `
            <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-3xl shadow">Pedidos Hoy: <span class="text-4xl font-bold text-pink-600">8</span></div>
                <div class="bg-white p-6 rounded-3xl shadow">Total Vendido: <span class="text-4xl font-bold text-pink-600">₡124,500</span></div>
            </div>
        `;
    } else if (tab === 1) {
        content.innerHTML = `<p class="text-xl">Gestión de Productos (aquí se agregarían/editarían)</p>`;
    } else if (tab === 2) {
        content.innerHTML = `<p class="text-xl">Lista de Órdenes Recibidas</p>`;
    } else if (tab === 3) {
        content.innerHTML = `<p class="text-xl">Configuración: SINPE, WhatsApp, Logo, etc.</p>`;
    }
}

function togglePause() {
    isPaused = !isPaused;
    const btn = document.getElementById('pauseBtn');
    btn.textContent = isPaused ? "Activar Pedidos" : "Pausar Pedidos";
    btn.style.backgroundColor = isPaused ? "#ef4444" : "";
    if (isPaused) alert("El restaurante está TEMPORALMENTE CERRADO");
}

// ==================== LOGOUT ====================
function logout() {
    location.reload();
}

// Checkout de ejemplo (puedes llamarlo desde el carrito)
function showCheckout() {
    const method = prompt("Elige método de pago:\n1. Tarjeta\n2. Efectivo\n3. SINPE Móvil");
    if (method === "3") {
        alert("SINPE: 8765-4321\n\nEnvía el comprobante por WhatsApp al 8888-8888");
    } else {
        alert("Pago registrado correctamente");
    }
}
</script>
</body>
</html>
