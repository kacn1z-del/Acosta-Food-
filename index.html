<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantones Food Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .gradient-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .glass-effect { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .card-hover:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center gradient-green">
    <div class="glass-effect rounded-3xl p-8 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <i class="fas fa-utensils text-5xl text-white mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800">Cantones Food Pro</h1>
        </div>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="Usuario" class="w-full px-4 py-3 rounded-2xl border" required>
            <input type="password" id="password" placeholder="Contraseña" class="w-full px-4 py-3 rounded-2xl border" required>
            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-2xl font-semibold">Iniciar Sesión</button>
        </form>
        <p class="text-center text-sm mt-4 text-gray-600">
            cliente / 1234<br>admin / admin
        </p>
    </div>
</div>

<!-- CLIENT VIEW -->
<div id="clientView" class="hidden min-h-screen">
    <!-- (El mismo cliente de antes - funciona bien) -->
    <header class="gradient-green p-4 flex justify-between items-center sticky top-0">
        <h1 class="text-white text-2xl font-bold">Cantones Food</h1>
        <div class="flex gap-4">
            <button onclick="toggleCart()" class="text-white relative">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span id="cartBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </button>
            <button onclick="logout()" class="text-white"><i class="fas fa-sign-out-alt text-2xl"></i></button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto p-6">
        <!-- Galería -->
        <div class="mb-8">
            <h2 class="text-xl font-bold mb-4">📸 Nuestro Local</h2>
            <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
        <!-- Menú -->
        <h2 class="text-2xl font-bold mb-4">Menú</h2>
        <div id="categoryFilters" class="flex gap-2 overflow-x-auto pb-4"></div>
        <div id="menuGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
</div>

<!-- ADMIN VIEW - Mejorado -->
<div id="adminView" class="hidden min-h-screen bg-gray-100">
    <div class="p-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Panel de Administrador</h1>
            <button onclick="logout()" class="bg-red-500 text-white px-6 py-2 rounded-xl">Cerrar Sesión</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow">
                <h3 class="text-gray-500">Pedidos Hoy</h3>
                <p class="text-4xl font-bold text-emerald-600 mt-2">12</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow">
                <h3 class="text-gray-500">Ingresos Hoy</h3>
                <p class="text-4xl font-bold text-emerald-600 mt-2">₡87,450</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow">
                <h3 class="text-gray-500">Productos</h3>
                <p class="text-4xl font-bold text-emerald-600 mt-2" id="productCount">8</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow p-6">
            <h2 class="font-bold text-xl mb-4">Productos del Menú</h2>
            <div id="adminProductList" class="space-y-4"></div>
        </div>
    </div>
</div>

<script>
// ==================== DATOS EDITABLES ====================
let products = [
    { id: 1, name: "Arroz Cantones Especial", price: 4500, category: "Platos Fuertes", description: "Arroz frito con mariscos", image: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400" },
    { id: 2, name: "Chop Suey de Pollo", price: 4200, category: "Platos Fuertes", description: "Pollo con vegetales", image: "https://images.unsplash.com/photo-1563379091339-03b21ab6c5e0?w=400" },
    { id: 3, name: "Wonton Frito", price: 2800, category: "Entradas", description: "Empanaditas chinas", image: "https://images.unsplash.com/photo-1496116218417-1a781b1c416c?w=400" }
    // Agrega más aquí
];

const restaurantPhotos = [
    "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=600",
    "https://images.unsplash.com/photo-1552566626-52f8b828add9?w=600",
    "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600"
];

let cart = [];

// ==================== LOGIN ====================
document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();

    if ((user === 'cliente' && pass === '1234') || (user === 'admin' && pass === 'admin')) {
        document.getElementById('loginScreen').classList.add('hidden');
        if (user === 'admin') {
            document.getElementById('adminView').classList.remove('hidden');
            renderAdminProducts();
        } else {
            document.getElementById('clientView').classList.remove('hidden');
            renderGallery();
            renderCategories();
            renderMenu();
        }
    } else {
        alert("Credenciales incorrectas");
    }
});

function logout() { location.reload(); }

// ==================== CLIENTE ====================
function renderGallery() {
    document.getElementById('gallery').innerHTML = restaurantPhotos.map(src => 
        `<img src="${src}" class="rounded-2xl h-40 w-full object-cover cursor-pointer" onclick="window.open('${src}')">`
    ).join('');
}

function renderCategories() {
    const cats = [...new Set(products.map(p => p.category))];
    document.getElementById('categoryFilters').innerHTML = cats.map(c => 
        `<button onclick="filterCategory('${c}')" class="px-5 py-2 bg-white rounded-full shadow whitespace-nowrap">${c}</button>`
    ).join('');
}

function renderMenu(filtered = products) {
    document.getElementById('menuGrid').innerHTML = filtered.map(p => `
        <div class="bg-white rounded-3xl shadow card-hover overflow-hidden">
            <img src="${p.image}" class="w-full h-48 object-cover">
            <div class="p-4">
                <h3 class="font-bold">${p.name}</h3>
                <p class="text-sm text-gray-600">${p.description}</p>
                <div class="flex justify-between mt-4">
                    <span class="text-xl font-bold text-emerald-600">₡${p.price}</span>
                    <button onclick="addToCart(${p.id})" class="bg-emerald-600 text-white px-5 py-2 rounded-2xl text-sm">Agregar</button>
                </div>
            </div>
        </div>
    `).join('');
}

function filterCategory(cat) {
    const filtered = products.filter(p => p.category === cat);
    renderMenu(filtered);
}

function addToCart(id) {
    const prod = products.find(p => p.id === id);
    cart.push(prod);
    document.getElementById('cartBadge').textContent = cart.length;
    alert(`${prod.name} agregado`);
}

function toggleCart() {
    alert("Productos en carrito: " + cart.length);
}

// ==================== ADMIN ====================
function renderAdminProducts() {
    document.getElementById('adminProductList').innerHTML = products.map(p => `
        <div class="flex justify-between items-center border-b pb-4">
            <div>
                <h4 class="font-semibold">${p.name}</h4>
                <p class="text-sm text-gray-500">₡${p.price} - ${p.category}</p>
            </div>
            <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:text-red-700">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    `).join('');
    document.getElementById('productCount').textContent = products.length;
}

function deleteProduct(id) {
    if (confirm("¿Eliminar este producto?")) {
        products = products.filter(p => p.id !== id);
        renderAdminProducts();
    }
}

// Cargar todo
window.onload = () => {};
</script>
</body>
</html>
